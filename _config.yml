title: Jack's Recipes
description: Jack's Recipes
baseurl: "/"
url: "https://recipes.jackthomas.io"
theme: minima
plugins:
  - jekyll-feed
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
header_pages:
  - about.md
  - all.md
  - categories.md
permalink: :title.html
collections:
  recipes:
    output: true
    permalink: :title.html
emptyArray: []
